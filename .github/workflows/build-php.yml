name: Build PHP Images

on:
  workflow_call:
    inputs:
      runs-on:
        description: Runner name i.e. default runner "ubuntu-24.04"
        type: string
        required: true
      platform:
        description: Platform i.e. "linux/amd64", "linux/arm64"
        type: string
        required: true
      image-name:
        description: Image name
        type: string
        required: true
      dockerfile:
        description: Dockerfile path
        type: string
        default: Dockerfile

jobs:
  build:
    name: Build Image
    runs-on: ${{ inputs.runs-on }}
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Image name
        id: image_name
        uses: ASzc/change-string-case-action@v8
        with:
          string: ${{ inputs.image-name }}

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        if: ${{ github.actor != 'dependabot[bot]' }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push by digest (runtime)
        uses: specsnl/github-actions/build-target@1.2.0
        with:
          platform: ${{ inputs.platform }}
          image-name: ${{ steps.image_name.outputs.lowercase }}
          dockerfile: ${{ inputs.dockerfile }}
          target: runtime

      - name: Build and Push by digest (builder)
        uses: specsnl/github-actions/build-target@1.2.0
        with:
          platform: ${{ inputs.platform }}
          image-name: ${{ steps.image_name.outputs.lowercase }}
          dockerfile: ${{ inputs.dockerfile }}
          target: builder

      - name: Build and Push by digest (builder_nodejs)
        uses: specsnl/github-actions/build-target@1.2.0
        with:
          platform: ${{ inputs.platform }}
          image-name: ${{ steps.image_name.outputs.lowercase }}
          dockerfile: ${{ inputs.dockerfile }}
          target: builder_nodejs
